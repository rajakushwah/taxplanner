name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/taxplanner_deploy
          chmod 600 ~/.ssh/taxplanner_deploy
          ls -l ~/.ssh/taxplanner_deploy

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /home/runner/.ssh/taxplanner_deploy
          script: |
            set -e
            cd /var/www/taxplanner
            git fetch --all
            git reset --hard origin/main
            /var/www/taxplanner/venv/bin/pip install -r requirements.txt
            /var/www/taxplanner/venv/bin/python manage.py migrate
            /var/www/taxplanner/venv/bin/python manage.py collectstatic --noinput
            systemctl restart taxplanner
            systemctl restart nginx
