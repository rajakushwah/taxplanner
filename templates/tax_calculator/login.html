{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="auth-icon bg-primary bg-opacity-10 text-primary rounded-circle mx-auto mb-3">
                            <i class="bi bi-box-arrow-in-right fs-2"></i>
                        </div>
                        <h3 class="fw-bold">Welcome Back!</h3>
                        <p class="text-muted">Login to access your tax calculations</p>
                    </div>

                    <form method="post" novalidate>
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                {{ form.username }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                {{ form.password }}
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0">Don't have an account?
                            <a href="{% url 'register' %}" class="text-primary fw-semibold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="{% url 'home' %}" class="text-muted">
                    <i class="bi bi-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
